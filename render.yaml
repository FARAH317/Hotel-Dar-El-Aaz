services:
  - type: web
    name: darelaaz-hotel-api
    runtime: python
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py populate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*.render.com"
      - key: ENVIRONMENT
        value: "production"
